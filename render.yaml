services:
  # FastAPI Backend (Includes Background Pipeline)
  - type: web
    name: job-intel-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false # Paste your Neon.tech connection string here manually on Render
      - key: API_PORT
        value: 8000

  # Streamlit Dashboard
  - type: web
    name: job-intel-dashboard
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run dashboard/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: API_PORT
        value: 8000
      - key: API_URL
        sync: false # Set this to your job-intel-api URL once deployed
      - key: DATABASE_URL
        sync: false # Paste your Neon.tech connection string here manually on Render
