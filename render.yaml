databases:
  - name: job-intel-db
    plan: free

services:
  # FastAPI Backend (Includes Background Pipeline)
  - type: web
    name: job-intel-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: job-intel-db
          property: connectionString
      - key: API_PORT
        value: 8000

  # Streamlit Dashboard
  - type: web
    name: job-intel-dashboard
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run dashboard/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: API_PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: job-intel-db
          property: connectionString
      - key: API_URL
        sync: false # You will still need to paste your API URL here after deployment
